name: Flyway Migration

on:
  push:
    branches:
      - main

jobs:
  flyway-migrate:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Flyway Version
        shell: cmd
        run: |
          "C:\Program Files\Red Gate\Flyway Desktop\flyway.cmd" -v

      - name: Run Flyway Migration
        shell: cmd
        run: |
          "C:\Program Files\Red Gate\Flyway Desktop\flyway.cmd" migrate -url="jdbc:mysql://192.168.138.18:3306/uat_backup" -user="%FLYWAY_USER%" -password="%FLYWAY_PASSWORD%" -locations="filesystem:migrations"
        env:
          FLYWAY_USER: ${{ secrets.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}